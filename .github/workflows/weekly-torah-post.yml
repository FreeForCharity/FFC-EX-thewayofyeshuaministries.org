name: Weekly Torah Portion Blog Post

on:
  schedule:
    # Every Friday at 6:00 AM UTC (11pm Thursday / midnight Friday in Arizona MST)
    - cron: '0 6 * * 5'
  workflow_dispatch: # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::Required secret ANTHROPIC_API_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Torah portion blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-torah-post.mjs

      - name: Format generated file
        run: npx prettier --write src/data/blog-posts.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/blog-posts.ts
          if git diff --staged --quiet; then
            echo "No new post generated (duplicate or holiday week) — nothing to commit."
          else
            git commit -m "feat: weekly Torah portion post for $(date +%Y-%m-%d)"
            git push origin main
            echo "✓ Post committed and pushed to main."
          fi

name: Weekly Torah Portion Blog Post

on:
  workflow_dispatch: # Manual trigger only — schedule disabled

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::Required secret ANTHROPIC_API_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Torah portion blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-torah-post.mjs

      - name: Format generated file
        run: npx prettier --write src/data/blog-posts.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/blog-posts.ts
          if git diff --staged --quiet; then
            echo "No new post generated (duplicate or holiday week) — nothing to commit."
          else
            git commit -m "feat: weekly Torah portion post for $(date +%Y-%m-%d)"
            git push origin main
            echo "✓ Post committed and pushed to main."
          fi

      - name: Warn if email secrets missing
        if: steps.generate.outputs.posted == 'true' && (secrets.GMAIL_ADDRESS == '' || secrets.GMAIL_APP_PASSWORD == '')
        run: echo "::warning::GMAIL_ADDRESS or GMAIL_APP_PASSWORD not set — skipping blog link email. Add both under Settings → Secrets → Actions to enable."

      - name: Email new blog link
        if: steps.generate.outputs.posted == 'true' && secrets.GMAIL_ADDRESS != '' && secrets.GMAIL_APP_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: ${{ secrets.GMAIL_ADDRESS }}
          to: patrickbearup94@gmail.com
          subject: 'New Blog Post: ${{ steps.generate.outputs.title }}'
          body: |
            A new weekly blog post was just published:

            ${{ steps.generate.outputs.title }}

            ${{ steps.generate.outputs.excerpt }}

            Read it here: https://thewayofyeshuaministries.org/blog/${{ steps.generate.outputs.slug }}

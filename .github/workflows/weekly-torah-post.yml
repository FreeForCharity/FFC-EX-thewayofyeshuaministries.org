name: Weekly Torah Portion Blog Post

on:
  workflow_dispatch: # Manual trigger only — schedule disabled

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::Required secret ANTHROPIC_API_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Torah portion blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-torah-post.mjs

      - name: Format generated file
        run: npx prettier --write src/data/blog-posts.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/blog-posts.ts
          if git diff --staged --quiet; then
            echo "No new post generated (duplicate or holiday week) — nothing to commit."
          else
            git commit -m "feat: weekly Torah portion post for $(date +%Y-%m-%d)"
            git push origin main
            echo "✓ Post committed and pushed to main."
          fi

      - name: Post new blog link to Facebook Page
        if: steps.generate.outputs.posted == 'true'
        env:
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          POST_TITLE: ${{ steps.generate.outputs.title }}
          POST_EXCERPT: ${{ steps.generate.outputs.excerpt }}
          POST_URL: https://thewayofyeshuaministries.org/blog/${{ steps.generate.outputs.slug }}
        run: |
          if [ -z "$FACEBOOK_PAGE_ACCESS_TOKEN" ] || [ -z "$FACEBOOK_PAGE_ID" ]; then
            echo "::warning::FACEBOOK_PAGE_ACCESS_TOKEN or FACEBOOK_PAGE_ID not set — skipping Facebook post. Add both under Settings → Secrets → Actions to enable auto-sharing."
            exit 0
          fi

          MESSAGE="${POST_TITLE}"$'\n\n'"${POST_EXCERPT}"
          RESPONSE=$(curl -sS -X POST "https://graph.facebook.com/v19.0/${FACEBOOK_PAGE_ID}/feed" \
            --data-urlencode "message=${MESSAGE}" \
            --data-urlencode "link=${POST_URL}" \
            --data-urlencode "access_token=${FACEBOOK_PAGE_ACCESS_TOKEN}")

          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "::error::Facebook post failed: ${RESPONSE}"
            exit 1
          fi
          echo "✓ Posted new blog link to Facebook Page."
